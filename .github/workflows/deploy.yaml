name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "book-recommender-be/**"
      - "aws/**"

jobs:
  batch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build batch project
        uses: ./.github/actions/build-gradle-project
        with:
          project: batch

  api-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build api project
        uses: ./.github/actions/build-gradle-project
        with:
          project: api
